services:
  postgres:
    image: ankane/pgvector:v0.5.1
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres', '-d', 'postgres']
      interval: 2s
      start_period: 2s
    environment:
      POSTGRES_PASSWORD: postgres123
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

  redis:
    image: redis:8.6.1-trixie
    ports:
      - '6379:6379'

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - '8123:8123'

  scylla:
    image: scylladb/scylla:5.2
    ports:
      - '9042:9042'

  migrations:
    image: node:24-bullseye-slim
    command: >
      bash -c '
        npm i &&
        for db in api-server-pg scylla clickhouse; do
          npm run db:create -- --db "$$db" --env staging;
          npm run db:update -- --db "$$db" --env staging;
        done
      '
    working_dir: /src
    env_file: ./.env.githubci
    volumes:
      - .:/src
    depends_on:
      postgres:
        condition: service_healthy
      scylla:
        condition: service_started
      clickhouse:
        condition: service_started

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: build_server
      args:
        OMIT_SNOWFLAKE: 'true'
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:8080/api/v1',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 20
    environment: &server_env
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_READ_ONLY_HOST: postgres
      DATABASE_PORT: '5432'
      DATABASE_NAME: postgres
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres123
      SESSION_SECRET: coop-demo-secret
      WAREHOUSE_ADAPTER: clickhouse
      ANALYTICS_ADAPTER: clickhouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: '8123'
      CLICKHOUSE_USERNAME: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_PROTOCOL: http
      REDIS_USE_CLUSTER: 'false'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      SCYLLA_HOSTS: 'scylla:9042'
      SCYLLA_USERNAME: cassandra
      SCYLLA_PASSWORD: cassandra
      SCYLLA_LOCAL_DATACENTER: datacenter1
      OTEL_SERVICE_NAME: COOP_DEMO
      EXPOSE_SENSITIVE_IMPLEMENTATION_DETAILS_IN_ERRORS: 'true'
      ALLOW_USER_INPUT_LOCALHOST_URIS: 'true'
      GRAPHQL_OPAQUE_SCALAR_SECRET: coop-demo-opaque-scalar
      UI_URL: http://localhost:3000
      PORT: '8080'
    depends_on:
      migrations:
        condition: service_completed_successfully

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: build_server
      args:
        OMIT_SNOWFLAKE: 'true'
    entrypoint: ['node']
    command:
      - 'bin/create-org-and-user.js'
      - '--name'
      - 'Zora'
      - '--email'
      - 'admin@zora.co'
      - '--password'
      - 'demo123!'
      - '--website'
      - 'https://zora.co'
      - '--firstName'
      - 'Demo'
      - '--lastName'
      - 'User'
    environment: *server_env
    depends_on:
      server:
        condition: service_healthy

  client:
    image: node:24-bullseye-slim
    working_dir: /app
    command: bash -c 'npm ci && DISABLE_ESLINT_PLUGIN=true npm start'
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
    environment:
      BROWSER: none
    depends_on:
      server:
        condition: service_healthy
